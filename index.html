<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">

<!-- PWA core -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lexitris">
<meta name="theme-color" content="#5533ee">
<meta name="description" content="Spell words as letters fall. A word puzzle game with 4 modes.">
<link rel="manifest" href="manifest.json">

<!-- Apple touch icon (inline SVG, no extra files needed) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%235533ee'/%3E%3Ctext x='256' y='320' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='210' fill='white'%3ELX%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%235533ee'/%3E%3Ctext x='256' y='320' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='210' fill='white'%3ELX%3C/text%3E%3C/svg%3E">

<title>LEXITRIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Space+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html{
  height:100%;width:100%;
  -webkit-text-size-adjust:100%;
  font-size:26px;
}
@media(max-width:400px){html{font-size:23px;}}
@media(min-width:600px){html{font-size:29px;}}
body{
  height:100vh;width:100vw;
  overflow:hidden;
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(160deg,#0a0e1a 0%,#0d1128 40%,#0e0d1f 100%);
  color:#d0d8f0;
  font-family:'Space Mono',monospace;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  display:flex;flex-direction:column;align-items:center;
  margin:0;padding:0;
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
}

/* Header */
#hdr{
  width:100%;box-sizing:border-box;
  display:flex;flex-direction:column;
  padding:6px 12px;
  flex-shrink:0;
  background:rgba(10,12,28,0.9);border-bottom:1px solid rgba(124,92,252,0.2);
  box-shadow:0 1px 20px rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.hdr-top{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;
}

/* Leaderboard overlay */
#lb-overlay{
  position:fixed;inset:0;z-index:400;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,6,20,0.96);
  backdrop-filter:blur(12px);
}
#lb-overlay.open{display:flex;}
#lb-panel{
  width:min(380px,96vw);
  max-height:92vh;
  overflow-y:auto;
  background:#0d0f20;
  border:1px solid rgba(124,92,252,0.25);
  border-radius:24px;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  animation:mdSlideUp .25s cubic-bezier(.22,.68,0,1.2);
}
#lb-header{
  padding:20px 20px 12px;
  text-align:center;
  border-bottom:1px solid rgba(124,92,252,0.15);
}
#lb-header h2{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:1.3rem;letter-spacing:.12em;
  background:linear-gradient(135deg,#f5a623,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;
}
.lb-mode-tabs{
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
}
.lb-tab{
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.65rem;
  padding:5px 12px;border-radius:20px;border:1px solid rgba(124,92,252,0.3);
  background:transparent;color:rgba(180,190,230,0.6);cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all .15s;
}
.lb-tab.active{
  background:rgba(124,92,252,0.2);border-color:rgba(124,92,252,0.6);
  color:#a78bfa;
}
#lb-list{padding:12px 16px;}
.lb-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;margin-bottom:6px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(124,92,252,0.1);
  border-radius:12px;
}
.lb-rank{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:.85rem;color:rgba(180,190,230,0.4);
  width:22px;text-align:center;flex-shrink:0;
}
.lb-rank.gold{color:#f5a623;}
.lb-rank.silver{color:#aaa;}
.lb-rank.bronze{color:#cd7f32;}
.lb-name{
  font-family:'Nunito',sans-serif;font-weight:700;
  font-size:.82rem;color:#d0d8f0;flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.lb-score{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:.9rem;color:#a78bfa;flex-shrink:0;
}
.lb-empty{
  text-align:center;padding:30px;
  font-family:'Nunito',sans-serif;font-size:.8rem;
  color:rgba(180,190,230,0.4);
}
#lb-loading{
  text-align:center;padding:30px;
  font-family:'Nunito',sans-serif;font-size:.8rem;
  color:rgba(180,190,230,0.5);
}
#lb-actions{padding:0 16px 20px;display:flex;flex-direction:column;gap:8px;}
#lb-submit-area{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(124,92,252,0.15);
  border-radius:14px;padding:12px 14px;
  display:none;
}
#lb-submit-area.show{display:block;}
#lb-submit-area label{
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.7rem;
  color:rgba(180,190,230,0.6);letter-spacing:.08em;display:block;margin-bottom:6px;
}
#lb-name-input{
  width:100%;box-sizing:border-box;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(124,92,252,0.25);
  border-radius:10px;padding:10px 12px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;
  color:#d0d8f0;outline:none;margin-bottom:8px;
}
#lb-submit-btn{
  width:100%;padding:12px;border:none;border-radius:12px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;
  background:linear-gradient(135deg,#7c5cfc,#5533cc);
  color:#fff;cursor:pointer;letter-spacing:.06em;
}
#lb-close-btn{
  width:100%;padding:12px;border-radius:12px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;
  color:rgba(160,170,210,0.7);cursor:pointer;
  background:transparent;border:1px solid rgba(124,92,252,0.15);
}

/* High score celebration */
#hs-celebration{
  position:fixed;inset:0;z-index:600;
  pointer-events:none;
  display:none;
}
#hs-celebration.show{ display:block; }
#hs-banner{
  position:absolute;top:30%;left:50%;
  transform:translateX(-50%) translateY(-50%);
  text-align:center;
  animation:hsBannerPop .4s cubic-bezier(.22,.68,0,1.4) forwards;
  opacity:0;
}
@keyframes hsBannerPop{
  0%{opacity:0;transform:translateX(-50%) translateY(-30%) scale(.6);}
  100%{opacity:1;transform:translateX(-50%) translateY(-50%) scale(1);}
}
#hs-banner .hs-title{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:1.8rem;letter-spacing:.12em;
  background:linear-gradient(135deg,#f5a623,#fff,#f5a623);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
  filter:drop-shadow(0 0 20px rgba(245,166,35,0.9));
  animation:hsGlow 1s ease-in-out infinite alternate;
}
@keyframes hsGlow{
  from{filter:drop-shadow(0 0 10px rgba(245,166,35,0.6));}
  to{filter:drop-shadow(0 0 30px rgba(245,166,35,1));}
}
#hs-banner .hs-score{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:2.8rem;color:#fff;
  text-shadow:0 0 30px rgba(124,92,252,0.9);
  margin-top:4px;
}
#hs-banner .hs-stars{
  font-size:1.6rem;letter-spacing:.15em;
  margin-bottom:8px;
  animation:hsSpin 2s linear infinite;
  display:inline-block;
}
@keyframes hsSpin{
  0%{transform:rotate(-5deg) scale(1);}
  50%{transform:rotate(5deg) scale(1.1);}
  100%{transform:rotate(-5deg) scale(1);}
}
#hs-confetti-cv{
  position:absolute;inset:0;width:100%;height:100%;
}

/* Best word animation banner */
#best-word-banner{
  position:fixed;
  left:50%;transform:translateX(-50%) translateY(0);
  top:120px;
  z-index:500;
  pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  opacity:0;
  transition:none;
}
#best-word-banner.show{
  animation:bestWordPop .3s cubic-bezier(.22,.68,0,1.4) forwards,
             bestWordFade 2.5s ease forwards;
}
@keyframes bestWordPop{
  0%{opacity:0;transform:translateX(-50%) translateY(20px) scale(.8);}
  100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
}
@keyframes bestWordFade{
  0%{opacity:1;}
  60%{opacity:1;}
  100%{opacity:0;transform:translateX(-50%) translateY(-30px);}
}
#best-word-banner .bwb-label{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:#f5a623;
  text-shadow:0 0 12px rgba(245,166,35,0.8);
}
#best-word-banner .bwb-word{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:1.4rem;letter-spacing:.12em;text-transform:uppercase;
  color:#fff;
  text-shadow:0 0 20px rgba(124,92,252,0.9), 0 0 40px rgba(124,92,252,0.5);
  background:linear-gradient(135deg,#f5a623,#fff,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#best-word-banner .bwb-pts{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:.85rem;letter-spacing:.08em;
  color:#4ade80;
  text-shadow:0 0 10px rgba(74,222,128,0.7);
}
#best-word-banner .bwb-stars{
  font-size:1.1rem;letter-spacing:.1em;
}
#hdr h1{
  font-family:'Nunito',sans-serif;font-size:clamp(.9rem,3.5vw,1.3rem);
  font-weight:900;letter-spacing:.2em;
  background:linear-gradient(90deg,#a78bfa,#7c5cfc,#00e5cc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stats{display:flex;gap:12px;}
.stat{text-align:center;}
.stat span{display:block;font-size:.38rem;letter-spacing:.15em;color:rgba(200,210,255,0.7);text-transform:uppercase;}
.stat b{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(.75rem,2.5vw,1rem);}
.gold{color:#f5a623;}
.blue{color:#00e5cc;}
.red{color:#ff3b6b;}

/* Main */
#main{display:flex;flex:1;width:100%;justify-content:center;align-items:stretch;gap:4px;padding:4px;overflow:hidden;min-height:0;}

/* Side panels */
.side{width:62px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
/* Hide right panel (tips) on narrow screens — board space matters more */
@media(max-width:420px){
  .side:last-child{display:none;}
}
@media(max-width:360px){
  .side{width:52px;}
}

.panel{
  background:rgba(255,255,255,0.04);border:1px solid rgba(124,92,252,0.2);border-radius:12px;
  padding:7px 5px;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.panel label{display:block;font-size:.36rem;letter-spacing:.18em;color:rgba(200,215,255,0.72);text-transform:uppercase;margin-bottom:4px;}
.next-box{
  width:52px;height:52px;margin:0 auto;
  border:1.5px solid rgba(124,92,252,0.5);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;
  color:#a78bfa;background:rgba(124,92,252,0.12);
  box-shadow:0 0 14px rgba(124,92,252,0.2),inset 0 1px 0 rgba(255,255,255,0.08);
}
#word-log{max-height:200px;overflow:hidden;font-size:.42rem;text-align:left;color:rgba(210,220,255,0.8);}
.wle{display:flex;justify-content:space-between;padding:2px 1px;border-bottom:1px solid rgba(124,92,252,0.12);animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.wle .w{color:#4ade80;font-weight:700;letter-spacing:.04em;}
.wle .p{color:#f5a623;font-weight:700;}

/* Canvas wrap */
#cw{position:relative;flex-shrink:0;}
canvas{display:block;border:1px solid rgba(124,92,252,0.25);border-radius:8px;box-shadow:0 0 30px rgba(124,92,252,0.12),0 8px 32px rgba(0,0,0,0.5);}
#particle-cv{position:absolute;top:0;left:0;pointer-events:none;border:none;box-shadow:none;background:transparent;border-radius:8px;}

/* Flash & popup */
.flash{
  position:absolute;pointer-events:none;border-radius:4px;
  background:rgba(124,92,252,0.35);
  animation:rowFlash .45s ease forwards;
}
@keyframes rowFlash{0%{opacity:1;box-shadow:0 0 20px rgba(124,92,252,0.6)}100%{opacity:0;box-shadow:none}}
.popup{
  position:absolute;
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:900;
  color:#f5a623;
  pointer-events:none;white-space:nowrap;
  text-shadow:0 0 10px rgba(245,166,35,0.6),0 1px 0 rgba(0,0,0,0.5);
  animation:floatUp .9s ease-out forwards;
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{transform:translateY(-22px) scale(1.1)}100%{opacity:0;transform:translateY(-44px) scale(.9)}}

/* Touch bar */
#tbar{
  display:flex;width:100%;gap:8px;padding:8px 10px;
  border-top:1px solid rgba(124,92,252,0.2);flex-shrink:0;
  background:rgba(10,12,28,0.9);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}

/* Level-up banner */
#level-up-banner{
  position:fixed;left:0;right:0;top:50%;transform:translateY(-50%);
  z-index:450;pointer-events:none;
  display:none;
  text-align:center;
  padding:16px 0;
  background:linear-gradient(90deg,transparent,rgba(124,92,252,0.15) 20%,rgba(124,92,252,0.25) 50%,rgba(124,92,252,0.15) 80%,transparent);
}
#level-up-banner.show{
  display:block;
  animation:lvlBannerIn .3s cubic-bezier(.22,.68,0,1.2) forwards, lvlBannerOut .4s ease 1.2s forwards;
}
#level-up-banner .lvl-text{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:1.4rem;letter-spacing:.15em;
  background:linear-gradient(135deg,#a78bfa,#00e5cc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(124,92,252,0.8));
}
@keyframes lvlBannerIn{0%{opacity:0;transform:translateY(-50%) scaleX(0.3);}100%{opacity:1;transform:translateY(-50%) scaleX(1);}}
@keyframes lvlBannerOut{0%{opacity:1;}100%{opacity:0;transform:translateY(-60%);}}

/* Danger pulsing glow on board */
#cw.danger-pulse canvas:first-child{
  animation:dangerPulse .8s ease-in-out infinite alternate;
}
@keyframes dangerPulse{
  0%{box-shadow:0 0 30px rgba(255,50,80,0.15),0 8px 32px rgba(0,0,0,0.5),inset 0 0 20px rgba(255,50,80,0.05);}
  100%{box-shadow:0 0 50px rgba(255,50,80,0.4),0 8px 32px rgba(0,0,0,0.5),inset 0 0 30px rgba(255,50,80,0.12);}
}

/* Next letter animation */
.next-box.pop{
  animation:nextPop .3s cubic-bezier(.22,.68,0,1.3);
}
@keyframes nextPop{
  0%{transform:scale(0.5);opacity:0.3;}
  60%{transform:scale(1.15);}
  100%{transform:scale(1);opacity:1;}
}

/* Combo badge on board */
#combo-badge{
  position:absolute;top:6px;right:6px;
  z-index:10;pointer-events:none;
  display:none;
  padding:3px 8px;
  border-radius:8px;
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:.7rem;letter-spacing:.06em;
  color:#fff;
  background:linear-gradient(135deg,#ff3b6b,#ff6b3b);
  box-shadow:0 0 16px rgba(255,59,107,0.6),0 2px 4px rgba(0,0,0,0.3);
  animation:comboPulse .6s ease-in-out infinite alternate;
}
#combo-badge.show{display:block;}
@keyframes comboPulse{0%{transform:scale(1);}100%{transform:scale(1.08);box-shadow:0 0 24px rgba(255,59,107,0.8),0 2px 4px rgba(0,0,0,0.3);}}

/* Word found cell glow */
.word-glow{
  position:absolute;pointer-events:none;border-radius:6px;
  background:rgba(74,222,128,0.25);
  border:2px solid rgba(74,222,128,0.6);
  box-shadow:0 0 14px rgba(74,222,128,0.5);
  animation:wordGlowFade .5s ease forwards;
}
@keyframes wordGlowFade{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.1);}}
.tbtn{
  flex:1;height:58px;
  background:rgba(124,92,252,0.12);border:1px solid rgba(124,92,252,0.35);border-radius:14px;
  font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:900;
  color:#a78bfa;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 0 rgba(85,51,204,0.6),inset 0 1px 0 rgba(255,255,255,0.08);
  transition:transform .08s,box-shadow .08s;
}
.tbtn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(85,51,204,0.6);}
#btn-drop{
  flex:1.6;background:rgba(255,59,107,0.12);border-color:rgba(255,59,107,0.4);color:#ff3b6b;
  box-shadow:0 4px 0 rgba(180,20,60,0.7),inset 0 1px 0 rgba(255,255,255,0.06);
  font-size:.72rem;letter-spacing:.1em;
}
#btn-drop:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(180,20,60,0.7);}
@media(max-width:400px){
  .tbtn{height:52px;}
}

/* Overlay */
#overlay{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#0a0e1a 0%,#0d1128 40%,#0e0d1f 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:50;padding:24px;
}
#overlay h2{
  font-family:'Nunito',sans-serif;font-size:clamp(1.6rem,6vw,2.4rem);
  font-weight:900;letter-spacing:.15em;
  background:linear-gradient(90deg,#a78bfa,#7c5cfc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:14px;
}
#overlay p{
  color:rgba(180,190,230,0.65);font-size:clamp(.62rem,2.2vw,.78rem);
  text-align:center;line-height:2;margin-bottom:5px;max-width:300px;
}
.big-score{
  font-family:'Nunito',sans-serif;font-size:clamp(2rem,8vw,3.2rem);
  font-weight:900;color:#f5a623;margin:8px 0;
  text-shadow:0 0 30px rgba(245,166,35,0.4);
}
.record{
  font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:900;
  color:#ff3b6b;animation:pulse .7s ease-in-out infinite alternate;margin-bottom:4px;
  text-shadow:0 0 12px rgba(255,59,107,0.5);
}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
.obtn{
  margin-top:16px;
  border:none;border-radius:12px;
  font-family:'Nunito',sans-serif;font-size:clamp(.75rem,2.5vw,.95rem);font-weight:900;
  letter-spacing:.15em;padding:14px 32px;cursor:pointer;
  text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;
}
.hs-wrap{margin-top:14px;width:230px;border-top:1px solid rgba(124,92,252,0.2);padding-top:10px;}

/* ══ LEXITRIS SCREEN SYSTEM ══════════════════════════════════════════════
   Premium dark theme — deep navy, glowing accents, frosted glass
   ══════════════════════════════════════════════════════════════════════ */

:root{
  --bg: linear-gradient(160deg,#0a0e1a 0%,#0d1128 40%,#0e0d1f 100%);
  --purple:#7c5cfc;
  --purple-dark:#5533cc;
  --purple-light:rgba(124,92,252,0.15);
  --border:rgba(124,92,252,0.22);
  --card-bg:rgba(255,255,255,0.05);
  --card-blur:blur(16px);
  --text-muted:rgba(180,190,230,0.5);
  --text-dim:rgba(180,190,230,0.75);
  --glow:#7c5cfc;
  --gold:#f5a623;
  --teal:#00e5cc;
  --danger:#ff3b6b;
}

/* Full-screen layer (intro, game-over, share, stats, mode dialog) */
.lx-screen{
  position:fixed;inset:0;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(160deg,#0a0e1a 0%,#0d1128 40%,#0e0d1f 100%);
  padding:24px 20px;
  z-index:300;
  overflow:hidden;
  touch-action:none;
  overscroll-behavior:none;
}
.lx-screen.open{ display:flex; }

/* Logo */
.lx-logo{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:clamp(2.2rem,9vw,3.8rem);
  letter-spacing:.1em;
  background:linear-gradient(135deg,#a78bfa 0%,#7c5cfc 50%,#00e5cc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
  animation:lxPulse 3s ease-in-out infinite;
}
@keyframes lxPulse{
  0%,100%{filter:drop-shadow(0 0 8px rgba(124,92,252,.3))}
  50%{filter:drop-shadow(0 0 24px rgba(124,92,252,.7))}
}
.lx-sub{
  font-family:'Space Mono',monospace;
  font-size:.52rem;letter-spacing:.32em;
  color:rgba(200,215,255,0.7);margin-bottom:28px;text-transform:uppercase;
}

/* Card — frosted dark glass */
.lx-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(124,92,252,0.22);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:16px;
  padding:16px 18px;
  width:min(300px,88vw);
  margin-bottom:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.06);
}
